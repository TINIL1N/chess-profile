<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Миклин Максим</title>

<link rel="icon" href="Me.png">

<style>

body{
margin:0;
font-family:system-ui,-apple-system,Arial;
background:linear-gradient(135deg,#1f2937,#111827);
color:white;
}

.container{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
background:#1f2937;
padding:45px;
border-radius:20px;
max-width:420px;
width:100%;
box-shadow:0 20px 40px rgba(0,0,0,0.5);
text-align:center;
}

.photo{
width:130px;
height:130px;
border-radius:50%;
object-fit:cover;
object-position:center top;
margin-bottom:15px;
border:3px solid #3b82f6;
}

h1{
margin:10px 0 5px 0;
font-size:30px;
}

.subtitle{
color:#9ca3af;
margin-bottom:10px;
}

.section{
margin-top:28px;
text-align:left;
}

.section h3{
margin-bottom:10px;
color:#9ca3af;
font-size:13px;
letter-spacing:1px;
text-transform:uppercase;
}

.ratings{
background:#111827;
padding:14px;
border-radius:10px;
line-height:1.9;
font-size:16px;
}

.rating{
font-weight:600;
}

.classic{color:#60a5fa;}
.rapid{color:#22c55e;}
.blitz{color:#ef4444;}

.ratingTitle{
display:block;
font-weight:700;
font-size:15px;
margin-bottom:6px;
color:#60a5fa;
text-decoration:none;
}

.ratingTitle:hover{
text-decoration:underline;
}

.ratingLine{
margin-left:6px;
}

.buttons{
margin-top:15px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.button{
flex:1;
text-align:center;
padding:10px;
background:#2563eb;
border-radius:10px;
color:white;
text-decoration:none;
font-size:14px;
transition:0.2s;
}

.button:hover{
background:#1d4ed8;
transform:translateY(-2px);
}

canvas{
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<img class="photo" src="Me.png">

<h1>Миклин Максим</h1>
<p class="subtitle">Шахматы ♟ Челябинск</p>

<div class="section">
<h3>Возраст</h3>
<span id="age">...</span>
</div>


<div class="section">

<h3>Рейтинги</h3>

<div class="ratings">

<a href="https://ratings.fide.com/profile/55620590" target="_blank" class="ratingTitle">
FIDE
</a>

<div class="ratingLine">
♟ Classic:
<span class="rating classic" id="fideStandard">...</span>
</div>

<div class="ratingLine">
⚡ Rapid:
<span class="rating rapid" id="fideRapid">...</span>
</div>

<div class="ratingLine">
🔥 Blitz:
<span class="rating blitz" id="fideBlitz">...</span>
</div>

</div>

</div>


<div class="section">

<h3>История рейтинга</h3>

<canvas id="ratingChart"></canvas>

</div>


<div class="section">

<h3>Профили</h3>

<div class="buttons">

<a class="button"
href="https://ratings.fide.com/profile/55620590"
target="_blank">FIDE</a>

<a class="button"
href="https://t.me/TINIL1N"
target="_blank">Telegram</a>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>
<script src="chart.js"></script>

</body>
</html>
