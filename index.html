<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Миклин Максим</title>

<link rel="icon" href="Me.png">

<style>

body{
margin:0;
font-family:system-ui,-apple-system,Arial;
background:linear-gradient(135deg,#1f2937,#111827);
color:white;
}

.container{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
background:#1f2937;
padding:45px;
border-radius:20px;
max-width:420px;
width:100%;
box-shadow:0 20px 40px rgba(0,0,0,0.5);
text-align:center;
}

.photo{
width:130px;
height:130px;
border-radius:50%;
object-fit:cover;
object-position:center top;
margin-bottom:15px;
border:3px solid #3b82f6;
}

h1{
margin:10px 0 5px 0;
font-size:30px;
}

.subtitle{
color:#9ca3af;
margin-bottom:10px;
}

.section{
margin-top:28px;
text-align:left;
}

.section h3{
margin-bottom:10px;
color:#9ca3af;
font-size:13px;
letter-spacing:1px;
text-transform:uppercase;
display:flex;
justify-content:space-between;
align-items:center;
}

.fideLink{
font-size:12px;
color:#60a5fa;
text-decoration:none;
}

.fideLink:hover{
text-decoration:underline;
}

.ratings{
background:#111827;
padding:14px;
border-radius:10px;
line-height:1.9;
font-size:16px;
}

.rating{
font-weight:600;
}

.classic{color:#60a5fa;}
.rapid{color:#22c55e;}
.blitz{color:#ef4444;}

.ratingLine{
margin-left:6px;
}

.buttons{
margin-top:15px;
display:flex;
justify-content:center;
gap:16px;
}

.iconButton{
width:38px;
height:38px;
display:flex;
align-items:center;
justify-content:center;
background:#2563eb;
border-radius:50%;
text-decoration:none;
transition:0.2s;
}

.iconButton:hover{
background:#1d4ed8;
transform:translateY(-2px);
}

.iconButton svg{
width:20px;
height:20px;
fill:white;
}

canvas{
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<img class="photo" src="Me.png">

<h1>Миклин Максим</h1>
<p class="subtitle">Шахматы ♟ Челябинск</p>

<div class="section">
<h3>Возраст</h3>
<span id="age">...</span>
</div>


<div class="section">

<h3>
Рейтинги
<a href="https://ratings.fide.com/profile/55620590" target="_blank" class="fideLink">FIDE ↗</a>
</h3>

<div class="ratings">

<div class="ratingLine">
♟ Classic:
<span class="rating classic" id="fideStandard">...</span>
</div>

<div class="ratingLine">
⚡ Rapid:
<span class="rating rapid" id="fideRapid">...</span>
</div>

<div class="ratingLine">
🔥 Blitz:
<span class="rating blitz" id="fideBlitz">...</span>
</div>

</div>

</div>


<div class="section">

<h3>История рейтинга</h3>

<canvas id="ratingChart"></canvas>

</div>


<div class="section">

<h3>Контакты</h3>

<div class="buttons">

<a class="iconButton"
href="https://t.me/TINIL1N"
target="_blank">

<svg viewBox="0 0 240 240">
<path d="M120 0C53.7 0 0 53.7 0 120s53.7 120 120 120 120-53.7 120-120S186.3 0 120 0zm58.2 82.1l-18.6 87.8c-1.4 6.2-5.2 7.7-10.5 4.8l-29-21.4-14 13.5c-1.5 1.5-2.8 2.8-5.7 2.8l2-28.4 51.7-46.7c2.3-2-0.5-3.2-3.5-1.2l-63.9 40.2-27.5-8.6c-6-1.9-6.1-6-1.3-7.9l107.6-41.5c5-1.9 9.4 1.2 7.7 7.6z"/>
</svg>

</a>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>
<script src="chart.js"></script>

</body>
</html>
