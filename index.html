.container{
display:flex;
justify-content:center;
align-items:center;

.card{

padding:12px;

line-height:1.8;

.buttons{

gap:10px;

.button{
flex:1;
text-align:center;
padding:10px;
background:#2563eb;
border-radius:10px;
color:white;
text-decoration:none;
font-size:14px;

.button:hover{
