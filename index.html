<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Миклин Максим</title>

<link rel="icon" href="Me.png">

<style>

body{
margin:0;
font-family:system-ui,-apple-system,Arial;
background:linear-gradient(135deg,#1f2937,#111827);
color:white;
}

.container{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
background:#1f2937;
padding:45px;
border-radius:20px;
max-width:420px;
width:100%;
box-shadow:0 20px 40px rgba(0,0,0,0.5);
text-align:center;
}

.photo{
width:130px;
height:130px;
border-radius:50%;
object-fit:cover;
object-position:center top;
margin-bottom:15px;
border:3px solid #3b82f6;
}

h1{
margin:10px 0 5px 0;
font-size:30px;
}

.subtitle{
color:#9ca3af;
margin-bottom:10px;
}

.about{
margin-top:12px;
font-size:14px;
color:#cbd5e1;
line-height:1.5;
}

.section{
margin-top:28px;
text-align:left;
}

.section h3{
margin-bottom:10px;
color:#9ca3af;
font-size:13px;
letter-spacing:1px;
text-transform:uppercase;
display:flex;
justify-content:space-between;
align-items:center;
}

.fideLink{
font-size:12px;
color:#60a5fa;
text-decoration:none;
}

.fideLink:hover{
text-decoration:underline;
}

.ratings{
background:#111827;
padding:14px;
border-radius:10px;
line-height:1.9;
font-size:16px;
}

.rating{
font-weight:600;
}

.classic{color:#60a5fa;}
.rapid{color:#22c55e;}
.blitz{color:#ef4444;}

.ratingLine{
margin-left:6px;
}

.buttons{
margin-top:15px;
display:flex;
justify-content:center;
gap:16px;
}

.iconButton{
width:38px;
height:38px;
display:flex;
align-items:center;
justify-content:center;
background:#2563eb;
border-radius:50%;
text-decoration:none;
transition:0.2s;
}

.iconButton:hover{
background:#1d4ed8;
transform:translateY(-2px);
}

.iconButton svg{
width:20px;
height:20px;
fill:white;
}

canvas{
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<img class="photo" src="Me.png">

<h1>Миклин Максим</h1>
<p class="subtitle">Шахматы ♟ Челябинск</p>

<div class="about" id="aboutText"></div>


<div class="section">

<h3>
Рейтинги
<a href="https://ratings.fide.com/profile/55620590" target="_blank" class="fideLink">FIDE ↗</a>
</h3>

<div class="ratings">

<div class="ratingLine">
♟ Classic:
<span class="rating classic" id="fideStandard">...</span>
</div>

<div class="ratingLine">
⚡ Rapid:
<span class="rating rapid" id="fideRapid">...</span>
</div>

<div class="ratingLine">
🔥 Blitz:
<span class="rating blitz" id="fideBlitz">...</span>
</div>

</div>

</div>


<div class="section">

<h3>История рейтинга</h3>

<canvas id="ratingChart"></canvas>

</div>


<div class="section">

<h3>Контакты</h3>

<div class="buttons">

<a class="iconButton"
href="https://t.me/TINIL1N"
target="_blank">

</svg>

</a>


<a class="iconButton"
href="https://vk.com/tinil1n"

<svg viewBox="0 0 24 24">

</svg>

</a>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>
<script src="chart.js"></script>

<script>

// динамическое описание
const birthDate = new Date("2010-02-03")
const today = new Date()

let age = today.getFullYear() - birthDate.getFullYear()
const m = today.getMonth() - birthDate.getMonth()

if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
age--
}

document.getElementById("aboutText").innerText =
`${age}-летний шахматист из Челябинска. Участник рейтинговых турниров FIDE, интересуюсь стратегией, обучением и развитием шахматного мышления.`

</script>

</body>
</html>
