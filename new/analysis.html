<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Разбор — Шахматный аналитик</title>
  <link rel="stylesheet" href="style.css" />

  <!-- Chessboard.js -->
  <link rel="stylesheet"
    href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css" />
  <script src="https://unpkg.com/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <style>
    .a-block { margin-bottom: 2.5rem; }

    .a-block--text p,
    .a-block--conclusion p {
      color: var(--text-sec);
      line-height: 1.85;
      margin-bottom: 0.85rem;
      font-size: 0.97rem;
    }

    .a-block--position {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .a-block--position.is-key {
      border-color: rgba(200,169,110,0.6);
    }

    .a-block__caption {
      padding: 0.6rem 1.25rem;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }

    .a-block__analysis {
      padding: 1.25rem 1.5rem;
      border-top: 1px solid var(--border);
    }

    .a-block__analysis p {
      color: var(--text-sec);
      line-height: 1.8;
      font-size: 0.93rem;
      margin-bottom: 0.75rem;
    }

    .a-block--conclusion {
      border-left: 3px solid var(--accent);
      padding: 1.25rem 1.5rem;
      background: rgba(200,169,110,0.04);
      border-radius: 0 4px 4px 0;
    }

    .key-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: var(--accent);
      color: #0A0A0A;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 0.25rem 0.75rem;
      border-radius: 99px;
      margin: 0.75rem 1.25rem 0;
    }

    /* Доска на странице разбора */
    .view-board-wrap {
      position: relative;
      max-width: 520px;
      margin: 0 auto;
      padding: 0.75rem;
      background: #111;
    }

    .view-board-wrap .board-b72b1 {
      border-radius: 2px;
    }

    .view-svg {
      position: absolute;
      top: 0.75rem;
      left: 0.75rem;
      width: calc(100% - 1.5rem);
      height: calc(100% - 1.5rem);
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>

  <header class="header header--scrolled" id="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">♟ Аналитик</a>
      <nav class="nav" id="nav">
        <a href="index.html#approach" class="nav__link">Подход</a>
        <a href="index.html#analysis" class="nav__link">Разборы</a>
        <a href="index.html#about"    class="nav__link">Обо мне</a>
        <a href="index.html#order"    class="btn btn--sm">Заказать разбор</a>
      </nav>
      <button class="burger" id="burger" aria-label="Меню">
        <i data-lucide="menu"></i>
      </button>
    </div>
  </header>

  <main style="padding-top:80px;padding-bottom:80px">

    <div id="loading" class="container" style="text-align:center;padding:6rem 0">
      <div style="font-size:2.5rem;margin-bottom:1rem">♟</div>
      <p style="color:var(--text-sec)">Загружаем разбор...</p>
    </div>

    <div id="error" class="container hidden" style="text-align:center;padding:6rem 0">
      <div style="font-size:2.5rem;margin-bottom:1rem">😔</div>
      <h2 style="font-family:var(--font-serif);margin-bottom:1rem;color:var(--text)">
        Разбор не найден
      </h2>
      <a href="index.html" class="btn">← На главную</a>
    </div>

    <div id="content" class="hidden">

      <div style="border-bottom:1px solid var(--border);padding-bottom:3rem;margin-bottom:3rem">
        <div class="container" style="max-width:820px">
          <a href="index.html#analysis"
            style="display:inline-flex;align-items:center;gap:0.4rem;
                   font-size:0.82rem;color:var(--text-sec);margin-bottom:2rem;
                   transition:color 0.2s;text-decoration:none"
            onmouseover="this.style.color='var(--text)'"
            onmouseout="this.style.color='var(--text-sec)'">
            ← Все разборы
          </a>

          <div id="a-tags"
            style="display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:1rem"></div>

          <h1 id="a-title"
            style="font-family:var(--font-serif);
                   font-size:clamp(1.8rem,4vw,2.8rem);
                   line-height:1.2;color:var(--text);margin-bottom:1rem"></h1>

          <p id="a-excerpt"
            style="font-size:1rem;color:var(--text-sec);
                   line-height:1.75;margin-bottom:1.25rem;max-width:640px"></p>

          <p id="a-date" style="font-size:0.78rem;color:var(--text-muted)"></p>
        </div>
      </div>

      <div id="a-blocks" class="container" style="max-width:820px"></div>

      <div style="margin-top:5rem;padding-top:3rem;border-top:1px solid var(--border)">
        <div class="container" style="max-width:820px;text-align:center">
          <h3 style="font-family:var(--font-serif);font-size:1.8rem;
                     color:var(--text);margin-bottom:0.75rem">
            Хочешь такой разбор своей партии?
          </h3>
          <p style="color:var(--text-sec);margin-bottom:1.5rem">
            Пришли ссылку — разберу в течение 48 часов
          </p>
          <a href="index.html#order" class="btn btn--lg">Заказать разбор</a>
        </div>
      </div>

    </div>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <a href="index.html" class="logo">♟ Шахматный аналитик</a>
      <nav class="footer__nav">
        <a href="index.html#analysis">Разборы</a>
        <a href="index.html#about">Обо мне</a>
        <a href="index.html#order">Заказать разбор</a>
      </nav>
      <p class="footer__copy" id="footer-copy"></p>
    </div>
  </footer>

  <script>
  // ============================================================
  //  LOAD
  // ============================================================

  async function loadAnalysis() {
    const id = new URLSearchParams(window.location.search).get('id');
    if (!id) { showError(); return; }

    try {
      const res = await fetch(`./data/analyses/${encodeURIComponent(id)}.json?t=` + Date.now());
      if (!res.ok) throw new Error();
      renderAnalysis(await res.json());
    } catch {
      showError();
    }
  }

  // ============================================================
  //  RENDER
  // ============================================================

  function renderAnalysis(data) {
    document.title = `${data.title||'Разбор'} — Шахматный аналитик`;

    document.getElementById('a-tags').innerHTML =
      (data.tags||[]).map(t=>`<span class="badge">${escH(t)}</span>`).join('');

    document.getElementById('a-title').textContent   = data.title   || '';
    document.getElementById('a-excerpt').textContent = data.excerpt  || '';
    document.getElementById('a-date').textContent    = fmtDate(data.date);
    document.getElementById('footer-copy').textContent =
      `© ${new Date().getFullYear()} Все права защищены`;

    const blocksEl = document.getElementById('a-blocks');
    blocksEl.innerHTML = '';

    (data.blocks||[]).forEach((block, i) => {
      const el = buildBlock(block, i);
      if (!el) return;
      blocksEl.appendChild(el);

      if (block.type === 'position') {
        requestAnimationFrame(() => initViewBoard(`vb-${i}`, block));
      }
    });

    document.getElementById('loading').classList.add('hidden');
    document.getElementById('content').classList.remove('hidden');
    lucide.createIcons();
  }

  function buildBlock(block, i) {
    const el = document.createElement('div');
    el.className = `a-block a-block--${block.type}`;

    if (block.type === 'text') {
      const text = (block.text||'').trim();
      if (!text) return null;
      el.innerHTML = text.split('\n').filter(l=>l.trim())
        .map(l=>`<p>${escH(l)}</p>`).join('');
      return el;
    }

    if (block.type === 'conclusion') {
      const text = (block.text||'').trim();
      if (!text) return null;
      el.innerHTML = `
        <div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;
                    color:var(--accent);font-weight:700;margin-bottom:0.75rem">Вывод</div>
        ${text.split('\n').filter(l=>l.trim()).map(l=>`<p>${escH(l)}</p>`).join('')}
      `;
      return el;
    }

    if (block.type === 'position') {
      el.classList.toggle('is-key', !!block.isKey);

      // Маркеры для стрелок
      const colors  = ['#C8A96E','#f87171','#4ade80','#60a5fa','#ffffff'];
      const markers = colors.map(c=>`
        <marker id="vm-${c.replace('#','')}-${i}"
          markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto">
          <path d="M0,0 L0,5 L5,2.5 z" fill="${c}"/>
        </marker>
      `).join('');

      el.innerHTML = `
        ${block.isKey ? '<div class="key-badge">⭐ Ключевой момент</div>' : ''}
        ${block.caption
          ? `<div class="a-block__caption">${escH(block.caption)}</div>`
          : ''
        }
        <div class="view-board-wrap">
          <div id="vb-${i}" style="width:100%"></div>
          <svg class="view-svg" id="vsvg-${i}" viewBox="0 0 480 480"
            xmlns="http://www.w3.org/2000/svg">
            <defs>${markers}</defs>
            <g id="vann-${i}"></g>
          </svg>
        </div>
        ${block.text&&block.text.trim()
          ? `<div class="a-block__analysis">
               ${block.text.split('\n').filter(l=>l.trim())
                 .map(l=>`<p>${escH(l)}</p>`).join('')}
             </div>`
          : ''
        }
      `;
      return el;
    }

    return null;
  }

  // ============================================================
  //  VIEW BOARD
  // ============================================================

  function initViewBoard(boardId, block) {
    const el = document.getElementById(boardId);
    if (!el) return;

    const orientation = block.boardOrientation || 'white';
    const pos         = block.boardPosition    || {};

    let startPos = 'start';
    if (block.fen) {
      startPos = block.fen.split(' ')[0];
    } else if (Object.keys(pos).length > 0) {
      startPos = pos;
    }

    Chessboard(boardId, {
      position:    startPos,
      orientation: orientation,
      pieceTheme: '/img/chesspieces/wikipedia/{piece}.png',
      draggable:   false,
    });

    const annotations = block.boardAnnotations || [];
    if (annotations.length > 0) {
      setTimeout(() => drawViewAnnotations(boardId, annotations, orientation), 200);
    }
  }

  function drawViewAnnotations(boardId, annotations, orientation) {
    // boardId = "vb-0", extracting index
    const idx = boardId.replace('vb-','');
    const g   = document.getElementById(`vann-${idx}`);
    if (!g) return;
    g.innerHTML = '';

    annotations.forEach(ann => {
      if (ann.type === 'highlight') {
        const p    = sqXY(ann.square, orientation);
        const rect = mkSVG('rect');
        rect.setAttribute('x',       p.cx);
        rect.setAttribute('y',       p.cy);
        rect.setAttribute('width',   60);
        rect.setAttribute('height',  60);
        rect.setAttribute('fill',    ann.color||'#C8A96E');
        rect.setAttribute('opacity', '0.45');
        g.appendChild(rect);
      }

      if (ann.type === 'arrow') {
        const from  = sqXY(ann.from, orientation);
        const to    = sqXY(ann.to,   orientation);
        const color = ann.color || '#C8A96E';
        const mid   = color.replace('#','');

        const dx  = to.x - from.x;
        const dy  = to.y - from.y;
        const len = Math.hypot(dx, dy);
        if (len < 1) return;

        const line = mkSVG('line');
        line.setAttribute('x1', from.x);
        line.setAttribute('y1', from.y);
        line.setAttribute('x2', to.x - (dx/len)*20);
        line.setAttribute('y2', to.y - (dy/len)*20);
        line.setAttribute('stroke',         color);
        line.setAttribute('stroke-width',   '7');
        line.setAttribute('stroke-linecap', 'round');
        line.setAttribute('opacity',        '0.85');
        line.setAttribute('marker-end',     `url(#vm-${mid}-${idx})`);
        g.appendChild(line);
      }

      if (ann.type === 'circle') {
        const p      = sqXY(ann.square, orientation);
        const circle = mkSVG('circle');
        circle.setAttribute('cx',           p.x);
        circle.setAttribute('cy',           p.y);
        circle.setAttribute('r',            26);
        circle.setAttribute('fill',         'none');
        circle.setAttribute('stroke',       ann.color||'#C8A96E');
        circle.setAttribute('stroke-width', '7');
        circle.setAttribute('opacity',      '0.85');
        g.appendChild(circle);
      }
    });
  }

  function sqXY(square, orientation) {
    const files   = ['a','b','c','d','e','f','g','h'];
    const flipped = orientation === 'black';
    const col     = files.indexOf(square[0]);
    const row     = 8 - parseInt(square[1]);
    const c       = flipped ? 7-col : col;
    const r       = flipped ? 7-row : row;
    const cell    = 60;
    return { x: c*cell+30, y: r*cell+30, cx: c*cell, cy: r*cell };
  }

  function mkSVG(tag) {
    return document.createElementNS('http://www.w3.org/2000/svg', tag);
  }

  // ============================================================
  //  UTILS
  // ============================================================

  function showError() {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('error').classList.remove('hidden');
  }

  function fmtDate(str) {
    if (!str) return '';
    try {
      return new Date(str).toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'});
    } catch { return str; }
  }

  function escH(str) {
    return String(str??'')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Burger
  document.getElementById('burger')?.addEventListener('click', () => {
    const nav    = document.getElementById('nav');
    const burger = document.getElementById('burger');
    const isOpen = nav.classList.toggle('nav--open');
    burger.innerHTML = isOpen ? '<i data-lucide="x"></i>' : '<i data-lucide="menu"></i>';
    lucide.createIcons();
  });

  document.addEventListener('DOMContentLoaded', () => {
    lucide.createIcons();
    loadAnalysis();
  });
  </script>
</body>
</html>
